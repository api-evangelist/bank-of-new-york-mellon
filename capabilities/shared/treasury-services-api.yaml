naftiko: "1.0.0-alpha1"

info:
  namespace: bny-treasury
  label: BNY Mellon Treasury Services API
  baseUrl: https://api.bnymellon.com/treasury/v4

authentication:
  - type: oauth2
    flow: clientCredentials
    tokenUrl: https://api.bnymellon.com/oauth/token
    description: OAuth2 Client Credentials for BNY Mellon API access

operations:
  - operationId: listAccounts
    method: GET
    path: /accounts
    description: List accounts
  - operationId: getAccount
    method: GET
    path: /accounts/{accountId}
    description: Get account details
    pathParameters: [accountId]
  - operationId: getAccountBalances
    method: GET
    path: /accounts/{accountId}/balances
    description: Get account balances
    pathParameters: [accountId]
  - operationId: listTransactions
    method: GET
    path: /accounts/{accountId}/transactions
    description: List account transactions
    pathParameters: [accountId]
  - operationId: initiatePayment
    method: POST
    path: /payments
    description: Initiate a payment
  - operationId: listPayments
    method: GET
    path: /payments
    description: List payments
  - operationId: getPayment
    method: GET
    path: /payments/{paymentId}
    description: Get payment details
    pathParameters: [paymentId]
  - operationId: initiateFundsTransfer
    method: POST
    path: /funds-transfers
    description: Initiate a funds transfer
  - operationId: getFundsTransfer
    method: GET
    path: /funds-transfers/{transferId}
    description: Get funds transfer details
    pathParameters: [transferId]
