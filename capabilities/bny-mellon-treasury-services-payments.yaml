naftiko: 1.0.0-alpha2
info:
  label: BNY Mellon Treasury Services API — Payments
  description: 'BNY Mellon Treasury Services API — Payments. 3 operations. Lead operation: Initiate Payment. Self-contained
    Naftiko capability covering one Bank Of New York Mellon business surface.'
  tags:
  - Bank Of New York Mellon
  - Payments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BANK_OF_NEW_YORK_MELLON_API_KEY: BANK_OF_NEW_YORK_MELLON_API_KEY
capability:
  consumes:
  - type: http
    namespace: bny-mellon-treasury-services-payments
    baseUri: https://api.bnymellon.com/treasury/v4
    description: BNY Mellon Treasury Services API — Payments business capability. Self-contained, no shared references.
    resources:
    - name: payments
      path: /payments
      operations:
      - name: initiatepayment
        method: POST
        description: Initiate Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listpayments
        method: GET
        description: List Payments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Payment status filter
        - name: fromDate
          in: query
          type: string
          description: Start date filter
        - name: toDate
          in: query
          type: string
          description: End date filter
    - name: payments-paymentId
      path: /payments/{paymentId}
      operations:
      - name: getpayment
        method: GET
        description: Get Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentId
          in: path
          type: string
          description: Payment identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.BANK_OF_NEW_YORK_MELLON_API_KEY}}'
  exposes:
  - type: rest
    namespace: bny-mellon-treasury-services-payments-rest
    port: 8080
    description: REST adapter for BNY Mellon Treasury Services API — Payments. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/payments
      name: payments
      description: REST surface for payments.
      operations:
      - method: POST
        name: initiatepayment
        description: Initiate Payment
        call: bny-mellon-treasury-services-payments.initiatepayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listpayments
        description: List Payments
        call: bny-mellon-treasury-services-payments.listpayments
        with:
          status: rest.status
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentid}
      name: payments-paymentid
      description: REST surface for payments-paymentId.
      operations:
      - method: GET
        name: getpayment
        description: Get Payment
        call: bny-mellon-treasury-services-payments.getpayment
        with:
          paymentId: rest.paymentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bny-mellon-treasury-services-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for BNY Mellon Treasury Services API — Payments. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: initiate-payment
      description: Initiate Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bny-mellon-treasury-services-payments.initiatepayment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-payments
      description: List Payments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bny-mellon-treasury-services-payments.listpayments
      with:
        status: tools.status
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment
      description: Get Payment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bny-mellon-treasury-services-payments.getpayment
      with:
        paymentId: tools.paymentId
      outputParameters:
      - type: object
        mapping: $.
