description: >-
  BNY Mellon is a global investments company providing asset servicing, asset management,
  wealth management, treasury services, and clearance and collateral management for
  institutions and individuals. The BNY Mellon Marketplace (marketplace.bnymellon.com)
  and developer portal (developer.bny.com) provide Treasury Services APIs for corporate
  clients to automate payments, account management, balance reporting, and funds transfers.
apis:
  - aid: bank-of-new-york-mellon:treasury-services-api
    name: BNY Mellon Treasury Services API
    tags:
      - Accounts
      - Balances
      - Funds Transfers
      - Institutional Banking
      - Payments
      - Treasury
      - Wire Transfers
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bnymellon.com/treasury/v4
    humanURL: https://marketplace.bnymellon.com/treasury/api-central/
    properties:
      - url: https://marketplace.bnymellon.com/treasury/api-central/
        type: Documentation
      - url: https://developer.bny.com/app/
        type: Documentation
        name: BNY Developer Marketplace
      - url: openapi/bny-mellon-treasury-services-api-openapi.yml
        type: OpenAPI
    description: >-
      The BNY Mellon Treasury Services API enables institutional clients to programmatically
      initiate and track payments (wire, ACH, SWIFT, CHIPS), access account balances and
      transaction history, and manage funds transfers. The API is available via the BNY
      Mellon Marketplace and supports global treasury operations across multiple currencies.
